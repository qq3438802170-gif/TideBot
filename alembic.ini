# A generic, single database configuration.

[alembic]
# 存放迁移脚本的相对路径
script_location = alembic

# 这里默认指向 data/db 下的 sqlite 文件
# 实际运行时，可以在 core/bootstrap.py 中动态覆盖这个值以读取 .env 的配置
sqlalchemy.url = sqlite+aiosqlite:///data/db/tidebot.db

# timezone = UTC

[post_write_hooks]
# 可以在这里配置黑客钩子，比如用 black 自动格式化生成的迁移脚本

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S