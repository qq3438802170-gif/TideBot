# A generic, single database configuration.

[alembic]
# 脚本文件存放位置，指向我们的 db 目录
script_location = src/tidebot/db/migrations

# 迁移脚本名称模板
# file_template = %%(rev)s_%%(slug)s

# 忽略 tz 环境，使用 UTC
timezone = UTC

# 生产环境下应从环境变量动态读取，这里提供占位符
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# 自动使用 ruff 格式化生成的迁移文件
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix --select I

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S